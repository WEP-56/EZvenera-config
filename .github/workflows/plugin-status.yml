name: Plugin Status

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/plugin-status.yml"
      - "scripts/check-plugin-status.mjs"
      - "docs/index.html"
      - "docs/.nojekyll"
      - "index.json"
      - "*.js"
  workflow_dispatch:
  schedule:
    - cron: "17 3 */3 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: plugin-status-pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate plugin status snapshot
        run: node scripts/check-plugin-status.mjs

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- docs/plugin-status.json)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated snapshot
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/plugin-status.json
          git commit -m "chore: update plugin status"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: check
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
